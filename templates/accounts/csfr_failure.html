{% extends 'base.html' %}
{% block title %}Session expirée — EduDevoir{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height:70vh">
  <div class="col-md-5 text-center" data-aos="fade-up">

    <div style="width:80px;height:80px;background:#FEF3C7;border-radius:50%;
      display:flex;align-items:center;justify-content:center;margin:0 auto 20px">
      <i class="fas fa-clock fa-2x" style="color:#D97706"></i>
    </div>

    <h3 class="fw-700 mb-2" style="color:#1E1B4B">Session expirée</h3>
    <p class="text-muted mb-4">
      Votre session a expiré après inactivité.<br>
      Veuillez vous reconnecter pour continuer.
    </p>

    <a href="{% url 'connexion' %}" class="btn btn-primary px-4 py-2">
      <i class="fas fa-sign-in-alt me-2"></i>Se reconnecter
    </a>

  </div>
</div>
{% endblock %}
